extends: default

rules:
  line-length:
    max: 140
    level: warning
  truthy: disable
  comments: disable
  document-start: disable
  indentation:
    indent-sequences: whatever
  # vendored subcharts (nginx-ingress, opentelemetry-collector) emit duplicate
  # app.kubernetes.io/part-of keys and trailing spaces that we cannot fix in tgz archives
  key-duplicates: disable
  trailing-spaces: disable
