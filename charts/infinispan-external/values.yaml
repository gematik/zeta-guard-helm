global:
  infinispanExternal:
    replicaCount: 1
    remote:
      host: ""
      port: ""
    admin:
      secretName: ""
      username: ""
      password: ""
    hsm:
      enabled: false
      endpoint: ""  # gRPC address of the HSM Proxy, e.g. "hsm-sim:50051"
      keyId: ""  # TLS key ID in the HSM, e.g. "zeta-guard-infinispan-tls-es256-v1.p256"
      caCert: ""  # PEM-encoded CA cert for TLS verification of the HSM proxy

    image:
      repository: infinispan-zeta
      tag: "15.2"
    imagePullPolicy: Always
    imagePullSecrets: [ ]
    registry_name: zeta/zeta-guard/

    serviceAccount:
      create: true
      name: infinispan

    resources: {}
    # resources:
    #   limits:
    #     cpu: "2"
    #     memory: "1Gi"
    #   requests:
    #     cpu: "500m"
    #     memory: "512Mi"

    podDisruptionBudget:
      enabled: false
      # minAvailable: 1
      # maxUnavailable: 1

    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault

    containerSecurityContext: {}
    #      allowPrivilegeEscalation: false
    #      readOnlyRootFilesystem: true
    #      runAsNonRoot: true
    #      runAsUser: 1000
    #      capabilities:
    #        drop: [ "ALL" ]

    extraJavaOptions: ""
    # extraJavaOptions: "-XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0 -XX:MinRAMPercentage=25.0"
