# See https://github.com/open-telemetry/opentelemetry-helm-charts/blob/opentelemetry-demo-0.38.6/charts/opentelemetry-demo/values.yaml
opentelemetry-demo:

  components:

    accounting:
      enabled: false

    ad:
      enabled: false

    cart:
      enabled: false

    checkout:
      enabled: false

    currency:
      enabled: false

    email:
      enabled: false

    fraud-detection:
      enabled: false

    frontend:
      enabled: false

    frontend-proxy:
      resources:
        limits:
          memory: 250Mi

    image-provider:
      enabled: false

    load-generator:
      enabled: false

    payment:
      enabled: false

    product-catalog:
      enabled: false

    product-reviews:
      enabled: false

    quote:
      enabled: false

    recommendation:
      enabled: false

    shipping:
      enabled: false

    flagd:
      enabled: false

    kafka:
      enabled: false

    llm:
      enabled: false

    postgresql:
      enabled: false

    valkey-cart:
      enabled: false

  opentelemetry-collector:
    config:
      connectors:
        spanmetrics:
          dimensions:
            - name: zeta-test.status.code
            - name: zeta-test.oauth_grant
              default: unknown

      processors:
        attributes/dienst_hersteller:
          actions:
            - key: gematik.zeta.kind
              action: insert
              value: dienst_hersteller
        attributes/gematik:
          actions:
            - key: gematik.zeta.kind
              action: insert
              value: monitoring
        attributes/ti_siem:
          actions:
            - key: gematik.zeta.kind
              action: insert
              value: siem
        attributes/ti_spanmetrics:
          actions:
            - key: gematik.zeta.kind
              action: insert
              value: spanmetrics
        # this is a workaround for https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/45428
        resource/delete_k8s_labels:
          attributes:
            - key: app
              action: delete
        transform/set_error_status:
          error_mode: ignore
          trace_statements:
            - context: span
              statements:
                # Mark spans with HTTP 4xx/5xx responses via a custom attribute so they appear in Prometheus error rate metrics.
                # status.code is a reserved OTel field (cannot be namespaced); zeta-test.status.code is a custom attribute.
                # http.status_code = old OTel semantic convention (PEP/nginx); http.response.status_code = new convention (Keycloak Java agent)
                - set(attributes["zeta-test.status.code"], "STATUS_CODE_ERROR") where attributes["http.status_code"] != nil and attributes["http.status_code"] >= 400
                - set(attributes["zeta-test.status.code"], "STATUS_CODE_ERROR") where attributes["http.response.status_code"] != nil and attributes["http.response.status_code"] >= 400
      receivers:
        otlp/dienst_hersteller:
          protocols:
            grpc:
              endpoint: "${env:MY_POD_IP}:4327"
            http:
              endpoint: "${env:MY_POD_IP}:4328"
        otlp/gematik:
          protocols:
            grpc:
              endpoint: "${env:MY_POD_IP}:4337"
            http:
              endpoint: "${env:MY_POD_IP}:4338"
        otlp/ti_siem:
          protocols:
            grpc:
              endpoint: "${env:MY_POD_IP}:4347"
            http:
              endpoint: "${env:MY_POD_IP}:4348"

      service:
        pipelines:
          logs/dienst_hersteller:
            receivers:
              - otlp/dienst_hersteller
            processors:
              - memory_limiter
              - resource/delete_k8s_labels
              - batch
              - attributes/dienst_hersteller
            exporters:
              - opensearch

          logs/ti_sim:
            receivers:
              - otlp/gematik
            processors:
              - memory_limiter
              - resource/delete_k8s_labels
              - batch
              - attributes/gematik
            exporters:
              - opensearch

          logs/ti_siem:
            receivers:
              - otlp/ti_siem
            processors:
              - memory_limiter
              - resource/delete_k8s_labels
              - batch
              - attributes/ti_siem
            exporters:
              - opensearch

          metrics/dienst_hersteller:
            receivers:
              - otlp/dienst_hersteller
            processors:
              - memory_limiter
              - batch
              - attributes/dienst_hersteller
            exporters:
              - otlphttp/prometheus

          metrics/ti_sim:
            receivers:
              - otlp/gematik
            processors:
              - memory_limiter
              - batch
              - attributes/gematik
            exporters:
              - otlphttp/prometheus

          metrics/ti_siem:
            receivers:
              - otlp/ti_siem
            processors:
              - memory_limiter
              - attributes/ti_siem
              - batch
            exporters:
              - otlphttp/prometheus

          traces/dienst_hersteller:
            receivers:
              - otlp/dienst_hersteller
            processors:
              - memory_limiter
              - transform/set_error_status
              - batch
              - attributes/dienst_hersteller
            exporters:
              - otlp

          traces/ti_sim:
            receivers:
              - otlp/gematik
            processors:
              - memory_limiter
              - transform/set_error_status
              - batch
              - attributes/gematik
            exporters:
              - otlp

          traces/ti_spanmetrics:
            receivers:
              - otlp/gematik
            processors:
              - memory_limiter
              - transform/set_error_status
              - batch
              - attributes/ti_spanmetrics
            exporters:
              - spanmetrics

          metrics/ti_spanmetrics:
            receivers:
              - spanmetrics
            processors:
              - memory_limiter
              - batch
              - attributes/ti_spanmetrics
            exporters:
              - otlphttp/prometheus

          traces/ti_siem:
            receivers:
              - otlp/ti_siem
            processors:
              - memory_limiter
              - transform/set_error_status
              - batch
              - attributes/ti_siem
            exporters:
              - otlp

    ports:
      otlp-dihe:
        enabled: true
        containerPort: 4327
        servicePort: 4327
        hostPort: 4327
        protocol: TCP
        appProtocol: grpc
      otlp-http-dihe:
        enabled: true
        containerPort: 4328
        servicePort: 4328
        hostPort: 4328
        protocol: TCP
      otlp-gemat:
        enabled: true
        containerPort: 4337
        servicePort: 4337
        hostPort: 4337
        protocol: TCP
        appProtocol: grpc
      otlp-http-gemat:
        enabled: true
        containerPort: 4338
        servicePort: 4338
        hostPort: 4338
        protocol: TCP
      otlp-siem:
        enabled: true
        containerPort: 4347
        servicePort: 4347
        hostPort: 4347
        protocol: TCP
        appProtocol: grpc
      otlp-http-siem:
        enabled: true
        containerPort: 4348
        servicePort: 4348
        hostPort: 4348
        protocol: TCP

ingressClassName: "nginx"
# ingressRulesHost defines the hostname for all ingress rules in this chart.
ingressRulesHost: "test-monitoring-ingress.localhost"
