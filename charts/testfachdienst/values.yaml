global:
  imagePullSecrets: []
  registry: europe-west3-docker.pkg.dev/gematik-pt-zeta-prod/zeta-dcr/
  registry_host: "europe-west3-docker.pkg.dev/gematik-pt-zeta-prod/zeta-dcr/"

registry_name: ""

image:
  repository: testfachdienst
  tag: "latest"
imagePullPolicy: Always

containerPort: 8080
managementPort: 8081

startupProbe:
  httpGet:
    path: /actuator/health
    port: management
    scheme: HTTPS
  periodSeconds: 5
  timeoutSeconds: 1
  failureThreshold: 24

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: management
    scheme: HTTPS
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: management
    scheme: HTTPS
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 1
  failureThreshold: 3

env: []

hostname: ""

# When enabled, injects a changing annotation to force pod rollouts
# on each helm upgrade/apply even if image tag is unchanged.
devMode: false
