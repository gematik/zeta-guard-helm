{{- if .Values.opa.enabled }}
# Precompute config snippets for checksum to avoid inline assignment
{{- $bundleCfg := "" }}
{{- if .Values.opa.bundle.enabled }}
{{- $bundleCfg = include "opa.bundleConfigYaml" . }}
{{- end }}
{{- $inlinePolicy := "" }}
{{- if not .Values.opa.bundle.enabled }}
{{- $inlinePolicy = include "opa.policyRego" . }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa
  labels:
    {{- include "opa.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.opa.replicaCount }}
  selector:
    matchLabels:
      {{- include "opa.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "opa.labels" . | nindent 8 }}
        {{- with .Values.opa.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if .Values.opa.podAnnotations | or .Values.devMode }}
      annotations:
        {{- with .Values.opa.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.devMode }}
        zeta.dev/rollout-timestamp: "{{ now | unixEpoch }}"
        {{- end }}
      {{- end }}
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- $wif := .Values.opa.workloadIdentityFederation }}
      {{- if .Values.opa.serviceAccountName }}
      serviceAccountName: {{ .Values.opa.serviceAccountName | quote }}
      {{- end }}
      {{- with .Values.opa.imagePullSecrets | default .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: opa
          {{- with .Values.opa.containerSecurityContext }}
          securityContext:
          {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.opa.image }}"
          imagePullPolicy: "{{ .Values.opa.imagePullPolicy }}"
          env:
            - name: CHECKSUM_OPA
              value: "{{ list $inlinePolicy (include "opa.configYaml" .) $bundleCfg | toJson | sha256sum }}"
          args:
            - "run"
            - "--server"
            - "--addr=0.0.0.0:8181"
            - "--log-level={{ .Values.opa.logLevel }}"
            {{- if or .Values.opaPolicy.logDecisions .Values.opa.bundle.enabled }}
            - "--config-file=/config/opa.yaml"
            {{- end }}
            {{- if not .Values.opa.bundle.enabled }}
            - "/policies/authz.rego"
            {{- end }}
          ports:
            - containerPort: 8181
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          {{- with .Values.opa.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if not .Values.opa.bundle.enabled }}
            - name: opa-policy
              mountPath: /policies/authz.rego
              subPath: authz.rego
              readOnly: true
            {{- end }}
            {{- if or .Values.opaPolicy.logDecisions .Values.opa.bundle.enabled }}
            - name: opa-config
              mountPath: /config/opa.yaml
              subPath: opa.yaml
              readOnly: true
            {{- end }}
            {{- if and .Values.opa.bundle.enabled (and $wif $wif.enabled) }}
            - name: gcp-token-volume
              mountPath: /var/run/secrets/gcp
              readOnly: true
            {{- end }}
            - name: opa-persistence
              mountPath: /var/opa
      volumes:
        {{- if not .Values.opa.bundle.enabled }}
        - name: opa-policy
          configMap:
            name: opa-policy
        {{- end }}
        {{- if or .Values.opaPolicy.logDecisions .Values.opa.bundle.enabled }}
        {{/* Decide if opa-config is a Secret based on presence of SecretRef credentials */}}
        {{- $cred := .Values.opa.bundle.credentials }}
        {{- $configIsSecret := false }}
        {{- if and .Values.opa.bundle.enabled $cred }}
          {{- if and $cred.secretRef $cred.secretRef.name }}
            {{- $configIsSecret = true }}
          {{- end }}
        {{- end }}
        - name: opa-config
          {{- if $configIsSecret }}
          secret:
            secretName: opa-config
          {{- else }}
          configMap:
            name: opa-config
          {{- end }}
        {{- end }}
        - name: opa-persistence
          emptyDir: {}
        {{- if and .Values.opa.bundle.enabled (and $wif $wif.enabled) }}
        - name: gcp-token-volume
          secret:
            secretName: opa-gcp-token
        {{- end }}
      {{- with .Values.opa.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.opa.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
