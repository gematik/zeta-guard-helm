{{- $wif := .Values.opa.workloadIdentityFederation -}}
{{- if and .Values.opa.enabled .Values.opa.bundle.enabled (and $wif $wif.enabled) (and $wif.tokenRenewer $wif.tokenRenewer.enabled) | or .Values.gematikConnectionEnabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opa-secret-patcher
  labels:
    {{- include "opa.labels" . | nindent 4 }}
rules:
  - apiGroups: [ "" ]
    resources: [ "secrets" ]
    verbs: [ "get","patch" ]
    resourceNames:
      - gematik-oidc-token
      - opa-gcp-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opa-token-renewer-secret-patcher
  labels:
    {{- include "opa.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: opa-token-renewer
roleRef:
  kind: Role
  name: opa-secret-patcher
  apiGroup: rbac.authorization.k8s.io
{{- end }}
