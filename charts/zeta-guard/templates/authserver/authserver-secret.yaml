apiVersion: v1
kind: Secret
metadata:
  name: authserver-admin
  labels:
    {{- include "authserver.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: "{{ .Values.authserver.admin.username }}"
  {{- if .Release.IsInstall }}
  password: {{ required "authserver.admin.password is required on first install" .Values.authserver.admin.password | quote }}
  {{- else }}
  password: {{ default "" .Values.authserver.admin.password | quote }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: pdp-smcb-truststore
  labels:
    {{- include "authserver.labels" . | nindent 4 }}
type: Opaque
data:
  keystore: "{{ $.Files.Get "files/ru-truststore.p12" | b64enc }}"
  password: "{{ "changeit" | b64enc }}"
---
apiVersion: v1
kind: Secret
metadata:
  name: pdp-tpm-truststore
  labels:
    {{- include "authserver.labels" . | nindent 4 }}
type: Opaque
data:
  password: "{{ "1cf8fa723930a3e73129cd7d9f3a845d71ca7268" | b64enc }}"
---
apiVersion: v1
kind: Secret
metadata:
  name: genesis-hash
  labels:
    {{- include "authserver.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Release.IsInstall }}
  hash: {{ required "authserver.genesisHash is required on first install" .Values.authserver.genesisHash | quote }}
  {{- else }}
  hash: ""
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: smcb-hashing-pepper
  labels:
    {{- include "authserver.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Release.IsInstall }}
  pepper: {{ required "authserver.smcbHashingPepper is required on first install" .Values.authserver.smcbHashingPepper | quote }}
  {{- else }}
  pepper: ""
  {{- end }}
