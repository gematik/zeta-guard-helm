{{- if and .Values.istio.enabled (eq .Values.databaseMode "cloudnative") }}
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: keycloak-db
  labels:
    app.kubernetes.io/part-of: zeta-guard
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: keycloak-db
  mtls:
    mode: STRICT
  portLevelMtls:
    5432: # Postgres replica communication
      mode: STRICT
    8000: # CNPG operator to pod communication
      mode: STRICT
{{- end }}
