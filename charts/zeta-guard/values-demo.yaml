authserver:
  config:
    maxClients: "256"
  hostname: ""
  provisioningProcessor:
    image:
      tag: 0.5.0
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      capabilities:
        drop: [ "ALL" ]
  initContainer:
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      capabilities:
        drop: [ "ALL" ]
  container:
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      capabilities:
        drop: [ "ALL" ]

imageTrustCertchainSecretRef: gematik-image-signer-test

ingress:
  sessionAffinity:
    enabled: false

pepproxy:
  replicaCount: 1
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop: [ "ALL" ]
  imagePullPolicy: Always
  nginxConf:
    generateConfigMap: true

    fachdienstUrl: https://fachdienst
    pepIssuer: http://authserver/auth/realms/zeta-guard
    poppIssuer: "http://localhost"
    requiredAudience: "test"
    requiredScopes: [ ]

# DB mode switch:
# - true: using CloudNativePG operator
# - false: use external db by providing values in authserverDb.*
cloudnativePg:
  enabled: true

# Which cert-manager ClusterIssuer to use for TLS on the Ingress (default)
clusterIssuer: "letsencrypt-cd"

opa:
  enabled: true
  # For demo, use inline policy by default so no registry credentials are required.
  bundle:
    # use Workload Identity Federation or secretRef when enabling bundle mode
    enabled: false
  provisioningProcessor:
    image:
      tag: 0.5.0
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      runAsUser: 1000
      capabilities:
        drop: [ "ALL" ]
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop: [ "ALL" ]
  # set if Workload Identity Federation is enabled
  cronjobSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop: [ "ALL" ]
  logLevel: info
  workloadIdentityFederation:
    enabled: false
# Decision logs toggle used by both inline and bundle configs
opaPolicy:
  logDecisions: true
  # Example fake policy: allow-all decision object.
  # The policies should be loaded from PIP-PAP Service (workload identity federation or secretRef)
  policyRego: |
    package policies.zeta.authz

    # Minimal decision object compatible with callers expecting
    # data.policies.zeta.authz.decision => {"allow": bool, "ttl": {"access_token": number, "refresh_token": number}}
    decision := {
      "allow": true,
      "ttl": {
        "access_token": 300,
        "refresh_token": 86400,
      },
    }

openshiftRoute:
  enabled: false
