apiVersion: v2
name: zeta-guard
description: ZETA Guard
type: application
version: 0.5.3
dependencies:
  - name: nginx-ingress
    # F5 NGINX Ingress Controller (NIC)
    version: 2.5.0
    repository: oci://ghcr.io/nginx/charts
    condition: nginxIngressEnabled
  - name: opentelemetry-collector
    version: "~0.147.0"
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    condition: telemetryGatewayEnabled
    alias: telemetry-gateway
  - name: cluster
    version: 0.6.0
    repository: https://cloudnative-pg.github.io/charts
    alias: cloudnativePg
    condition: cloudnativePg.enabled
