{{- if .Values.issuers.local.enabled }}
{{- $local := .Values.issuers.local }}
{{- $issuerName := $local.issuerName | default "local-selfsigned" }}
{{- $certName := $local.certificateName | default (printf "%s-cert" $issuerName) }}
{{- $secretName := $local.secretName | default "zeta-guard-tls" }}
{{- $dnsNames := $local.dnsNames | default (list) }}
{{- $duration := $local.duration | default "8760h" }}
{{- $commonName := $local.commonName | default "" }}
{{- if and (eq $commonName "") (gt (len $dnsNames) 0) }}
  {{- $commonName = index $dnsNames 0 }}
{{- end }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ $issuerName }}
  namespace: {{ .Release.Namespace }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $certName }}
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ $secretName }}
  duration: {{ $duration | quote }}
{{- if $commonName }}
  commonName: {{ $commonName | quote }}
{{- end }}
  privateKey:
    # Silence cert-manager >=1.18 warning
    rotationPolicy: Always
    algorithm: ECDSA
    size: 256
{{- if gt (len $dnsNames) 0 }}
  dnsNames:
    {{- range $dnsNames }}
    - {{ . | quote }}
    {{- end }}
{{- end }}
  usages:
    - digital signature
    - key encipherment
    - server auth
  issuerRef:
    kind: Issuer
    name: {{ $issuerName }}
{{- end }}
